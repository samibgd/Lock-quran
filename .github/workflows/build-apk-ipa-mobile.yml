name: Build Kivy APK with Buildozer

on:
  push:
    branches: [ main, master ] # يشتغل تلقائياً عند رفع الكود
  workflow_dispatch: # يتيح لك تشغيل البناء يدوياً بضغطة زر

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libffi-dev python3-dev ffmpeg apktool openjdk-17-jdk

    - name: Install Buildozer and Cython
      run: |
        pip install --upgrade pip
        pip install buildozer cython virtualenv

    - name: Build APK with Buildozer
      run: |
        buildozer -v android debug
      env:
        ACCEPT_SDK_LICENSE: "y"

    - name: Upload finished APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Premium-Locker-APK
        path: bin/*.apk
